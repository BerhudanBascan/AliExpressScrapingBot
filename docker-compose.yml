version: "3.8"

services:
  # Ana uygulama
  app:
    build: .
    container_name: dropship-pro
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - APP_NAME=AliExpress Dropshipping Pro
      - APP_HOST=0.0.0.0
      - APP_PORT=5000
      - APP_DEBUG=false
      - MONGODB_URI=mongodb://mongo:27017/
      - MONGODB_DB_NAME=aliexpress_dropshipping
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./logs:/app/logs
      - ./exports:/app/exports
      - ./data:/app/data
      - ./.env:/app/.env
    depends_on:
      - mongo
      - redis
    networks:
      - dropship-network

  # MongoDB
  mongo:
    image: mongo:7.0
    container_name: dropship-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=aliexpress_dropshipping
    volumes:
      - mongo_data:/data/db
    networks:
      - dropship-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: dropship-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dropship-network

  # MongoDB Admin UI (opsiyonel)
  mongo-express:
    image: mongo-express:1.0
    container_name: dropship-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017/
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      - mongo
    networks:
      - dropship-network
    profiles:
      - admin

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local

networks:
  dropship-network:
    driver: bridge
